<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>捕梦 · DreamCatcher — 智能互动白板</title>
    <meta name="description" content="边聊天边在白板上生长内容，AI驱动的交互式会议纪要工具" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ── Top Bar ── -->
    <nav class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="btn-icon" id="canvasListBtn" title="画布列表">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <!-- 捕梦网外框 - 黄底 -->
            <rect width="28" height="28" rx="0" fill="#FFD600" stroke="#000" stroke-width="2"/>
            <!-- 捕梦网编织纹理 -->
            <circle cx="14" cy="14" r="9" stroke="#000" stroke-width="1.5" fill="none"/>
            <circle cx="14" cy="14" r="6" stroke="#000" stroke-width="1.5" fill="none"/>
            <circle cx="14" cy="14" r="3" stroke="#000" stroke-width="1.5" fill="none"/>
            <!-- 中心点 -->
            <circle cx="14" cy="14" r="1.5" fill="#000"/>
          </svg>
          <span class="logo-text">捕梦 · DreamCatcher</span>
        </div>
      </div>

      <div class="topbar-center">
        <h1 class="board-title" id="boardTitle" title="点击编辑标题">未命名白板</h1>
      </div>

      <div class="topbar-right">
        <button class="btn-icon" id="newCanvasBtn" title="新建画布">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="btn-icon" id="undoBtn" title="撤销 Ctrl+Z" aria-label="撤销">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 5H9C11.2 5 13 6.8 13 9s-1.8 4-4 4H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 3L3 5l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn-icon" id="redoBtn" title="重做 Ctrl+Y" aria-label="重做">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 5H7C4.8 5 3 6.8 3 9s1.8 4 4 4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 3l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="topbar-divider"></div>
        <button class="btn btn-ghost" id="importJson">导入</button>
        <button class="btn btn-ghost" id="downloadJson">导出</button>
        <button class="btn btn-primary" id="resetDemo">演示</button>
        <div class="topbar-divider"></div>
        <button class="btn-icon" id="settingsBtn" title="设置" aria-label="设置">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.4"/><path d="M14.5 9c0-.4 0-.8-.1-1.2l1.6-1.2-1.5-2.6-1.9.8A6 6 0 0011 3.9L10.7 2h-3L7.4 4A6 6 0 005.7 4.9l-1.9-.8L2.3 6.7 3.9 7.8C3.8 8.2 3.7 8.6 3.7 9s0 .8.1 1.2l-1.6 1.2 1.5 2.6 1.9-.8a6 6 0 001.7.8L7.6 16h3l.3-2a6 6 0 001.7-.8l1.9.8 1.5-2.6-1.6-1.2c.1-.4.1-.8.1-1.2z" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
    </nav>

    <!-- 画布列表下拉菜单 -->
    <div class="canvas-list-menu" id="canvasListMenu" aria-hidden="true">
      <div class="canvas-list-header">
        <span class="canvas-list-title">画布列表</span>
        <button class="btn-icon" id="newCanvasFromListBtn" title="新建画布">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1v16M1 9h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="canvas-list-items" id="canvasListItems">
        <!-- 动态生成 -->
      </div>
      <div class="canvas-list-empty" id="canvasListEmpty" style="display:none;">
        暂无历史画布
      </div>
    </div>

    <!-- ── Main Workspace: Canvas + Chat ── -->
    <div class="workspace" id="workspace">

      <!-- Canvas Area (left, main) -->
      <main class="canvas-area" id="canvasArea">
        <!-- Canvas Controls (floating top-left) -->
        <div class="canvas-controls" id="canvasControls">
          <button class="ctrl-btn" id="autoLayoutBtn" title="自动布局">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="5" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="10" y="5" width="5" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="10" y="11" width="5" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M6 3h2a1 1 0 011 1v2M9 7h1M9 13h1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button class="ctrl-btn" id="aiOrganizeBtn" title="AI智能整理">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14M4.5 4.5l7 7M11.5 4.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="ctrl-divider"></div>
          <button class="ctrl-btn" id="zoomOut" title="缩小">−</button>
          <span class="zoom-label" id="zoomLabel">100%</span>
          <button class="ctrl-btn" id="zoomIn" title="放大">+</button>
          <div class="ctrl-divider"></div>
          <button class="ctrl-btn" id="fitBtn" title="适应视口">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 5V1.5H5M9 1.5h3.5V5M12.5 9v3.5H9M5 12.5H1.5V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- The infinite canvas -->
        <div class="mindmap-view" id="mindmapView">
          <div class="canvas-transform" id="canvasTransform">
            <svg id="linkLayer" class="link-layer" aria-hidden="true" width="6000" height="6000" viewBox="0 0 6000 6000">
              
            </svg>
            <div id="blockCanvas" class="block-canvas"></div>
          </div>
        </div>

        <!-- Floating node actions (show when node selected) -->
        <div class="node-toolbar node-toolbar-matrix" id="nodeToolbar" aria-hidden="true">
          <div class="ntb-matrix-grid">
            <!-- AI 功能区 -->
            <div class="ntb-matrix-row ntb-matrix-row--ai">
              <button class="ntb-matrix-btn" id="refineNode" title="AI 内容提炼">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                <span>精炼</span>
              </button>
              <button class="ntb-matrix-btn" id="splitNode" title="拆分为多个块">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
                <span>拆分</span>
              </button>
              <button class="ntb-matrix-btn" id="mergeNode" title="合并选中块">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2"/><rect x="8" y="14" width="7" height="7" stroke="currentColor" stroke-width="2"/></svg>
                <span>合并</span>
              </button>
            </div>
            <div class="ntb-matrix-row ntb-matrix-row--ai">
              <button class="ntb-matrix-btn" id="expandNode" title="扩张内容">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="5" y="5" width="14" height="14" stroke="currentColor" stroke-width="2" rx="2"/></svg>
                <span>扩张</span>
              </button>
              <button class="ntb-matrix-btn" id="deriveNode" title="派生子层级">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v8m0 0l-3-3m3 3l3-3M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>派生</span>
              </button>
              <button class="ntb-matrix-btn" id="translateNode" title="中英互译">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 12h16M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 5v14M16 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                <span>翻译</span>
              </button>
            </div>
            <!-- 结构操作区 -->
            <div class="ntb-matrix-row ntb-matrix-row--structure">
              <button class="ntb-matrix-btn" id="addChild" title="添加子块">
                <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>子块</span>
              </button>
              <button class="ntb-matrix-btn" id="addSibling" title="添加同级">
                <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><path d="M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 4v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>同级</span>
              </button>
              <button class="ntb-matrix-btn" id="pinNode" title="锁定/解锁">
                <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><path d="M7 1v5m0 7v-2m-2-5h4M5 1h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>锁定</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Refine Confirmation Dialog -->
        <div class="refine-confirm-box" id="refineConfirmBox" aria-hidden="true">
          <div style="font-size:12px; margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">✨ 预览 AI 提炼</div>
          <div style="display:flex; gap:8px;">
            <button class="rc-btn rc-btn-yes" id="refineYes">✔ 保留</button>
            <button class="rc-btn rc-btn-no" id="refineNo">✖ 撤回</button>
          </div>
        </div>
      </main>

      <!-- Right Chat Panel -->
      <aside class="chat-panel" id="chatPanel">
        <div class="chat-panel-header">
          <h2 class="chat-panel-title">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2H2a1 1 0 00-1 1v8.5a1 1 0 001 1h1.5V15l3.5-2.5H14a1 1 0 001-1V3a1 1 0 00-1-1z" stroke="currentColor" stroke-width="1.3"/></svg>
            对话
          </h2>
          <button class="btn-icon chat-collapse-btn" id="chatToggleBtn" title="折叠面板" aria-label="折叠聊天面板">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l5 4-5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <div class="chat-messages" id="chatMessages" aria-live="polite">
          <div class="chat-welcome">
            <div class="chat-welcome-icon">💡</div>
            <p>你好！我是你的白板助手。</p>
            <p>开始聊天，我会在白板上帮你整理内容。</p>
            <div class="chat-welcome-hints">
              <button class="hint-chip" data-hint="总结近期AI大模型的最新突破与应用方向">科技前沿探索</button>
              <button class="hint-chip" data-hint="帮我梳理大语言模型底层的核心原理">学习技术原理</button>
              <button class="hint-chip" data-hint="有哪些结合AI的创新产品点子？不妨头脑风暴一下">记录灵感创意</button>
            </div>
          </div>
        </div>

        <div class="chat-input-area" id="chatInputArea">
          <div class="chat-suggestions" id="chatSuggestions" aria-live="polite"></div>
          <div class="waveform-bar" id="waveformBar" aria-hidden="true">
            <canvas id="waveformCanvas" width="300" height="32"></canvas>
            <span class="wave-time" id="waveTime">00:00</span>
          </div>
          <div class="chat-input-row">
            <button class="voice-btn" id="recordBtn" title="点击开始/停止连续对话" aria-label="连续对话">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="5.5" y="1.5" width="7" height="9" rx="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 8.5a6 6 0 0012 0M9 14.5V17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <span class="voice-pulse" id="voicePulse"></span>
            </button>
            <button class="voice-btn" id="audioUploadBtn" title="上传音频转写" aria-label="上传音频转写">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v8m0 0l-3-3m3 3l3-3M3 12.5v1A1.5 1.5 0 004.5 15h9a1.5 1.5 0 001.5-1.5v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <input id="audioFileInput" type="file" accept="audio/*" hidden />
            <textarea id="chatInput" class="chat-input" rows="1" placeholder="输入消息..." aria-label="聊天输入"></textarea>
            <button class="send-btn" id="sendBtn" title="发送" aria-label="发送">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M16 2L2 8l5.5 3L11 15l5-13z" fill="currentColor" opacity="0.15"/><path d="M16 2L2 8l5.5 3L11 15l5-13z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M16 2l-8.5 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Collapsed chat toggle (visible when panel collapsed) -->
      <button class="chat-expand-btn" id="chatExpandBtn" aria-label="展开聊天面板" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M16 2H2a1.5 1.5 0 00-1.5 1.5v10A1.5 1.5 0 002 15h2v2.5l4-2.5h8a1.5 1.5 0 001.5-1.5v-10A1.5 1.5 0 0016 2z" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
    </div>

    <!-- ── Settings Modal ── -->
    <div class="modal-overlay" id="settingsOverlay" aria-hidden="true">
      <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-label="配置设置">
        <div class="modal-header">
          <h2 class="modal-title">设置</h2>
          <button class="btn-icon" id="closeSettings" aria-label="关闭">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <!-- LLM -->
          <div class="cfg-section">
            <h3 class="cfg-title">大语言模型 (LLM)</h3>
            <div class="cfg-grid">
              <label class="cfg-label">供应商
                <select id="llmProvider" class="cfg-input"><option value="tongyi" selected>通义千问</option><option value="doubao">豆包</option><option value="custom">自定义</option></select>
              </label>
              <label class="cfg-label full">Endpoint
                <input id="llmEndpoint" type="url" class="cfg-input" placeholder="https://..." />
              </label>
              <label class="cfg-label full">模型 (Model)
                <div style="display:flex; gap:8px;">
                  <input id="llmModel" type="text" list="modelDataList" class="cfg-input" style="flex:1" placeholder="例如: qwen-max-latest" />
                  <datalist id="modelDataList"></datalist>
                  <button type="button" class="btn btn-ghost btn-sm" id="fetchModelsBtn">获取列表</button>
                </div>
              </label>
            </div>
          </div>
          <!-- Voice -->
          <div class="cfg-section">
            <h3 class="cfg-title">语音模式</h3>
            <div class="cfg-grid">
              <label class="cfg-label">模式
                <select id="voiceMode" class="cfg-input">
                  <option value="doubao-pipeline" selected>豆包语音流水线</option>
                  <option value="doubao-realtime">豆包实时语音</option>
                  <option value="browser">浏览器兜底</option>
                </select>
              </label>
              <label class="cfg-label">语言
                <input id="voiceLanguage" type="text" class="cfg-input" placeholder="zh-CN" value="zh-CN" />
              </label>
            </div>
          </div>
          <!-- STT -->
          <div class="cfg-section">
            <h3 class="cfg-title">语音转写 (STT)</h3>
            <div class="cfg-grid">
              <label class="cfg-label">供应商
                <select id="sttProvider" class="cfg-input"><option value="tongyi">通义千问</option><option value="doubao" selected>豆包</option><option value="custom">自定义</option></select>
              </label>
              <label class="cfg-label">流式模型
                <input id="sttModel" type="text" class="cfg-input" placeholder="例如: doubao-asr-streaming-2.0" />
              </label>
              <label class="cfg-label">文件模型
                <input id="fileSttModel" type="text" class="cfg-input" placeholder="例如: doubao-asr-file-2.0" />
              </label>
              <label class="cfg-label full">Endpoint
                <input id="sttEndpoint" type="url" class="cfg-input" placeholder="https://..." />
              </label>
            </div>
          </div>
          <!-- TTS -->
          <div class="cfg-section">
            <h3 class="cfg-title">语音合成 (TTS)</h3>
            <div class="cfg-grid">
              <label class="cfg-label">供应商
                <select id="ttsProvider" class="cfg-input"><option value="tongyi">通义千问</option><option value="doubao" selected>豆包</option><option value="browser">浏览器内置</option><option value="custom">自定义</option></select>
              </label>
              <label class="cfg-label">模型
                <input id="ttsModel" type="text" class="cfg-input" placeholder="例如: doubao-tts-2.0" />
              </label>
              <label class="cfg-label">音色
                <input id="ttsVoice" type="text" class="cfg-input" placeholder="例如: zh_female_roumei" />
              </label>
              <label class="cfg-label">实时模型
                <input id="realtimeVoiceModel" type="text" class="cfg-input" placeholder="例如: doubao-realtime-voice" />
              </label>
              <label class="cfg-label full">Endpoint
                <input id="ttsEndpoint" type="url" class="cfg-input" placeholder="https://..." />
              </label>
            </div>
          </div>
          <!-- Auth -->
          <div class="cfg-section">
            <h3 class="cfg-title">认证</h3>
            <div class="cfg-grid">
              <label class="cfg-label full">LLM API Key
                <input id="llmApiKey" type="password" class="cfg-input" placeholder="LLM API Key" />
              </label>
              <label class="cfg-label full">豆包 API Key
                <input id="doubaoApiKey" type="password" class="cfg-input" placeholder="Doubao API Key" />
              </label>
              <label class="cfg-label">豆包 APP ID（旧版可选）
                <input id="appId" type="password" class="cfg-input" placeholder="APP ID" />
              </label>
              <label class="cfg-label">豆包 Access Token（旧版可选）
                <input id="accessToken" type="password" class="cfg-input" placeholder="Access Token" />
              </label>
              <label class="cfg-label">豆包 Secret Key（旧版可选）
                <input id="secretKey" type="password" class="cfg-input" placeholder="Secret Key" />
              </label>
              <label class="cfg-label full">代理 URL（可选）
                <input id="proxyUrl" type="url" class="cfg-input" placeholder="https://your-proxy/api" />
              </label>
            </div>
          </div>
          <!-- OAuth -->
          <details class="cfg-section">
            <summary class="cfg-title cfg-summary">OAuth（可选）</summary>
            <div class="cfg-grid" style="margin-top:10px">
              <label class="cfg-label">提供方
                <select id="oauthProvider" class="cfg-input"><option value="none" selected>不使用</option><option value="codex">CODEX</option><option value="antigravity">antigravity</option><option value="custom">自定义</option></select>
              </label>
              <label class="cfg-label">Client ID<input id="oauthClientId" type="text" class="cfg-input"/></label>
              <label class="cfg-label full">Authorize URL<input id="oauthAuthUrl" type="url" class="cfg-input"/></label>
              <label class="cfg-label full">Token URL<input id="oauthTokenUrl" type="url" class="cfg-input"/></label>
              <label class="cfg-label">Scope<input id="oauthScope" type="text" class="cfg-input" value="openid profile"/></label>
              <label class="cfg-label">Redirect URI<input id="oauthRedirect" type="url" class="cfg-input"/></label>
              <div class="cfg-row full">
                <button class="btn btn-ghost btn-sm" id="oauthStart">OAuth 登录</button>
